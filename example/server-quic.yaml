# PaqetPremium server — QUIC transport over pcap
core: paqetpremium
version: 2

role: server
name: kharej-exit-quic

log:
  level: info

listen:
  addr: ":8888"

network:
  interface: eth0
  ipv4:
    addr: "10.0.0.100:8888"
    router_mac: "aa:bb:cc:dd:ee:ff"
  tcp:
    local_flag: ["PA"]

transport:
  protocol: quic
  conn: 6
  kcp:
    key: CHANGE_ME_SECRET_KEY
  quic:
    alpn: paqetpremium
    idle_timeout: 30s
    max_idle_timeout: 60s

admin:
  listen: "127.0.0.1:9090"
  metrics: true
