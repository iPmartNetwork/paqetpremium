# PaqetPremium client — QUIC transport over pcap
core: paqetpremium
version: 2

role: client
name: iran-entry-quic

log:
  level: info

upstream:
  strategy: failover
  health_check:
    interval: 10s
    timeout: 3s
    fail_threshold: 3
    recover_threshold: 2
  servers:
    - name: primary
      addr: 45.1.1.1:8888
      key: CHANGE_ME_SECRET_KEY
      priority: 1

forward:
  - listen: "0.0.0.0:443"
    target: "127.0.0.1:443"
    protocol: tcp

network:
  interface: eth0
  ipv4:
    addr: "10.0.0.5:0"
    router_mac: "aa:bb:cc:dd:ee:ff"
  tcp:
    local_flag: ["PA"]
    remote_flag: ["PA"]

transport:
  protocol: quic
  conn: 6
  kcp:
    key: CHANGE_ME_SECRET_KEY
  quic:
    alpn: paqetpremium
    idle_timeout: 30s
    max_idle_timeout: 60s

admin:
  listen: "127.0.0.1:9090"
  metrics: true
